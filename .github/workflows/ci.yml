name: EuroClaw CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        make install-dev

    - name: Lint Code
      run: make lint

    - name: Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r src/ plugins/

    - name: Run Unit Tests
      run: make test-unit

    - name: Run Integration Tests
      run: |
        # Copies the example env to a real .env for the docker-compose build
        cp .env_example .env
        make test-integration